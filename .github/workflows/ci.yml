name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.1.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm lint

  # SUP-13 type-safety bar audits. Run as peer jobs (not steps in `lint`)
  # so they show up as distinct required checks in branch protection,
  # which is what SUP-7 sub-task 9 needs to gate.
  check-tsconfig-bar:
    name: Check Tsconfig Bar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit tsconfig type-safety bar
        run: node scripts/check-tsconfig-bar.mjs

  lint-no-ts-bypass:
    name: Lint No TS Bypass
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit @ts-* directive policy
        run: node scripts/lint-no-ts-bypass.mjs

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.1.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type checking
        run: pnpm type-check

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests with coverage
        run: pnpm --filter @supplex/web test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/web/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    # Spin up a vanilla Postgres alongside the job so the API integration
    # tests (which call into `@supplex/db` and exercise real SQL via
    # `insertOneOrThrow`, `selectFirstOrThrow`, etc.) have a database to
    # talk to. SUP-7 sub-task 9a-3.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: supplex_test
          POSTGRES_PASSWORD: supplex_test
          POSTGRES_DB: supplex_test
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before any step
        # that depends on it runs.
        options: >-
          --health-cmd "pg_isready -U supplex_test -d supplex_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Backend tests load `apps/api/src/config.ts`, which validates the
      # full Supabase + database env contract via Zod at module init.
      # Tests don't actually call out to Supabase, so stub URLs/keys
      # satisfy the schema while the real DB connection points at the
      # service container above.
      DATABASE_URL: postgres://supplex_test:supplex_test@localhost:5432/supplex_test
      SUPABASE_URL: http://localhost:54321
      SUPABASE_ANON_KEY: ci-anon-key-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key-placeholder
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.1.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        # Custom CI migration runner — the Drizzle journal only tracks
        # 0000-0013, while the real schema lives in 0000-0041. The
        # script applies every `*.sql` migration in lexical order and
        # skips the handful that bind to Supabase-only schemas/roles
        # (`auth.*`, `storage.*`, `supabase_auth_admin`, etc.).
        run: pnpm --filter @supplex/db db:migrate:ci

      - name: Run backend tests with coverage
        run: pnpm --filter @supplex/api test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/api/coverage/lcov.info
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Job to check overall CI status - required for branch protection
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs:
      [
        lint,
        check-tsconfig-bar,
        lint-no-ts-bypass,
        type-check,
        test-frontend,
        test-backend,
      ]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          if [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more CI jobs were cancelled"
            exit 1
          fi
          echo "All CI jobs passed successfully"

